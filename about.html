<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About — The Verdict on AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
--green:#007A4D;--green-dark:#005c3a;--green-light:#e6f4ed;
--gold:#C49A00;--gold-light:#fdf8e1;
--ink:#0f0f0f;--ink-soft:#3a3530;
--paper:#f6f1e9;--paper-dark:#ede7db;
--muted:#8a8070;--rule:#d9d2c5;--navy:#1a3a5c;
--font-display:'Playfair Display',Georgia,serif;
--font-body:'DM Sans',sans-serif;
--font-mono:'DM Mono',monospace;
}
body{background:var(--paper);color:var(--ink);font-family:var(--font-body);padding-top:6px;}
a{text-decoration:none;color:inherit;}

.flag-strip{position:fixed;top:0;left:0;width:100%;height:6px;display:flex;z-index:1000;}
.flag-strip span{flex:1;}
.flag-strip span:nth-child(1){background:#007A4D;}
.flag-strip span:nth-child(2){background:#C49A00;}
.flag-strip span:nth-child(3){background:#000;}
.flag-strip span:nth-child(4){background:#C8102E;}
.flag-strip span:nth-child(5){background:#003DA5;}

.site-header{position:sticky;top:6px;background:var(--paper);border-bottom:1px solid var(--rule);z-index:999;}
.header-top{display:flex;align-items:center;justify-content:space-between;padding:16px 48px 0;}
.site-name-wrap .site-name{font-family:var(--font-display);font-size:22px;font-weight:700;letter-spacing:0.01em;}
.site-name-wrap .site-name .verdict{color:var(--green);}
.header-tagline{font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:0.15em;text-transform:uppercase;margin-top:2px;}
.site-nav{display:flex;justify-content:center;gap:40px;padding:10px 48px 14px;}
.site-nav a{font-family:var(--font-mono);font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink);transition:color 0.2s;}
.site-nav a:hover,.site-nav a.active{color:var(--green);border-bottom:2px solid var(--green);padding-bottom:2px;}

.ticker{background:#0f0f0f;border-top:2px solid var(--gold);border-bottom:2px solid var(--gold);padding:8px 0;overflow:hidden;white-space:nowrap;}
.ticker-track{display:inline-flex;animation:ticker 40s linear infinite;}
.ticker-item{font-family:var(--font-mono);font-size:11px;color:#e8e0d0;letter-spacing:0.12em;padding:0 48px;}
.ticker-item::before{content:"◆ ";color:var(--gold);}
@keyframes ticker{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}

.about-hero{max-width:860px;margin:64px auto 0;padding:0 48px;}
.about-hero h1{font-family:var(--font-display);font-size:42px;font-weight:700;line-height:1.15;margin-bottom:16px;}
.about-hero .lead{font-size:18px;color:var(--ink-soft);line-height:1.7;margin-bottom:48px;}

.about-body{max-width:860px;margin:0 auto;padding:0 48px 80px;}
.about-body p{font-size:16px;line-height:1.8;color:var(--ink-soft);margin-bottom:24px;}
.about-body h2{font-family:var(--font-display);font-size:26px;font-weight:700;margin:48px 0 16px;}

.about-profile{display:grid;grid-template-columns:180px 1fr;gap:40px;align-items:start;background:var(--paper-dark);border:1px solid var(--rule);border-radius:4px;padding:40px;margin-bottom:48px;}
.about-profile img{width:180px;height:180px;object-fit:cover;border-radius:50%;border:3px solid var(--green);}
.about-profile-text h2{font-family:var(--font-display);font-size:28px;margin-bottom:4px;}
.about-profile-text .role{font-family:var(--font-mono);font-size:12px;letter-spacing:0.15em;text-transform:uppercase;color:var(--green);margin-bottom:16px;}
.about-profile-text p{font-size:15px;line-height:1.75;color:var(--ink-soft);}

.site-footer{background:var(--ink);color:#c8c0b4;padding:48px 48px 24px;}
.footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:48px;margin-bottom:40px;}
.footer-brand .footer-logo{font-family:var(--font-display);font-size:20px;color:#fff;margin-bottom:8px;}
.footer-brand .footer-logo span{color:var(--green);}
.footer-brand p{font-size:13px;line-height:1.6;}
.footer-col h4{font-family:var(--font-mono);font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold);margin-bottom:16px;}
.footer-col ul{list-style:none;}
.footer-col ul li{margin-bottom:8px;}
.footer-col ul li a{font-size:13px;color:#c8c0b4;transition:color 0.2s;}
.footer-col ul li a:hover{color:#fff;}
.footer-bottom{border-top:1px solid #2a2a2a;padding-top:24px;display:flex;justify-content:space-between;align-items:center;}
.footer-bottom p{font-size:12px;}
.footer-bottom .footer-legal{display:flex;gap:24px;}
.footer-bottom .footer-legal a{font-size:12px;color:#8a8070;}
</style>
</head>
<body>
<div class="flag-strip"><span></span><span></span><span></span><span></span><span></span>
